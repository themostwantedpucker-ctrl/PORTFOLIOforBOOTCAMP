<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMAR's Portfolio | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="aurora-bg"></div>
    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo">UMAR's<span>Portfolio</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2 style="display: block; text-align: center;">Let's Connect</h2>
            <div class="contact-container">
                <form action="#" method="POST" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" required placeholder="Umar Farooq">
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" required placeholder="umar@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="6" required placeholder="Tell me about your project..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary submit-btn">Send Secure Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 UMAR's-Portfolio. Crafted with semantic HTML & pure CSS.</p>
    </footer>

</body>
</html>
